# `npm_shared` is an external network shared with the Nginx Proxy Manager
# stack — create it once with `docker network create npm_shared` (or let
# NPM's own compose file create it) and attach NPM's container to it too.
# The app is never published to the host at all; NPM reaches it by Docker DNS
# name (the `app` service name below) over this network instead.
networks:
  #npm_shared:
  #  external: true
  coturn_net:
    driver: bridge

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    networks:
      - npm_shared
    environment:
      PORT: 3000
      NODE_ENV: production
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-}
      TURN_URL: ${TURN_URL:-}
      TURN_SECRET: ${TURN_SECRET:-}
      TURN_USERNAME: ${TURN_USERNAME:-}
      TURN_CREDENTIAL: ${TURN_CREDENTIAL:-}
    restart: unless-stopped
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"

  # Optional self-hosted TURN relay for clients behind carrier-grade NAT.
  # Disabled by default. Start with: docker compose --profile turn up
  # On its own network, isolated from the app — the two never need to talk to
  # each other over Docker's internal network.
  coturn:
    image: coturn/coturn:alpine
    profiles: ["turn"]
    networks:
      - coturn_net
    environment:
      # Not required here at compose-parse time (would break `docker compose
      # up` for the default `app`-only path even when the turn profile isn't
      # used) — render-config.sh enforces this at container start instead,
      # which only happens when this profile is actually invoked.
      TURN_SECRET: ${TURN_SECRET:-}
      TURN_REALM: ${TURN_REALM:-turn.local}
    entrypoint: ["/bin/sh", "/render-config.sh"]
    volumes:
      - ./coturn/turnserver.conf.template:/etc/coturn/turnserver.conf.template:ro
      - ./coturn/render-config.sh:/render-config.sh:ro
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49152-49200:49152-49200/udp"
    restart: unless-stopped
    cap_drop: ["ALL"]
    # turnserver's binary carries a NET_BIND_SERVICE file capability; dropping
    # ALL without granting it back makes execve() fail with EPERM even though
    # 3478/49152+ aren't privileged ports — the kernel refuses to honor the
    # binary's file-capability grant if it's outside the container's bounding
    # set, regardless of whether it's actually exercised at runtime.
    cap_add: ["NET_BIND_SERVICE"]
    security_opt: ["no-new-privileges:true"]
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 128m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"
